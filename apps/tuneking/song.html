<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuneKing — Shared Song</title>
    <meta name="robots" content="noindex">

    <!-- This page has moved. TuneKing song shares are now served from
         https://www.tuneking.app/song/<id>/ (the songShare Cloud Function, which
         owns the player and renders correct link previews). Old links of the form
         .../song.html?id=<id> land here; forward them, preserving the id. -->
    <script>
        (function () {
            var id = new URLSearchParams(location.search).get("id");
            location.replace(id
                ? "https://www.tuneking.app/song/" + encodeURIComponent(id) + "/"
                : "https://www.tuneking.app/");
        })();
    </script>

    <!-- No-JS fallback. It can't read the ?id= query param, so it forwards to the
         TuneKing home; the script above handles the id-preserving redirect. -->
    <meta http-equiv="refresh" content="0; url=https://www.tuneking.app/">
    <link rel="canonical" href="https://www.tuneking.app/">
</head>
<body>
    <p>Redirecting… If you are not redirected,
        <a href="https://www.tuneking.app/">open TuneKing</a>.</p>
</body>
</html>
